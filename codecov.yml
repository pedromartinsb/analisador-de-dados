codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 0%
        informational: false
    patch:
      default:
        target: 80%
        informational: false

ignore:
  - "src/test/**"

comment:
  layout: "reach, diff, files"
  behavior: default